name: Build, Push and Deploy Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t simple-app .

      - name: Run Container
        run: docker run -d -p 8080:80 simple-app
